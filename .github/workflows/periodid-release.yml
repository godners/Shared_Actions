name: "[WORKFLOW] Periodic Release"
# .github/workflows/periodic-release.yml

on:
  schedule:
    - cron: '00 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-release:
    runs-on: ubuntu-latest   # self-hosted
    steps:
      - name: "[STEP] Run Checkout Repository via Action"
        id: Checkout
        uses: actions/checkout@main
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: "[STEP] Run Periodic Release via Action"
        uses: ./periodic-release
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          Checkout: false
